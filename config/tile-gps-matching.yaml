# Tile / GPS matching for scripts/tile_gps_matching.py (see Args in that file).
# Edit paths, then run: uv run scripts/tile_gps_matching.py run --config=config/tile-gps-matching.yaml

# Parent folder of full-resolution images (required)
root: data/Dry-season-Kapiri-Camp2-Rep1-Raw

# Folder containing tiled images to match (optional but typical)
tiled_images_folder: data/Dry_Kapiri/Camp 2/Rep 1 - tiled

# GPS coordinate file (optional, will be created if not provided)
config_file_csv: null

log_file: tiles_matching.log

# Crop margins as fraction of height/width removed from each edge band (required)
rmheight: 0.24
rmwidth: 0.21

overlapfactor: 0.1
ratiowidth: 1.0
ratioheight: 1.0

flight_height: 180
sensor_height: 24

n_workers: 3

# Mean Absolute Error
mae_threshold: 255.0

# Failure threshold: number of verification failures tolerated before stopping  the script
failure_threshold: 5 

# Written by the script unless overridden
out_json_coords_files: null
load_existing_json_file: false

# save
save_tiles: false
out_folder: null

patterns:
  - "**/*.jpg"
  - "**/*.JPG"
  - "**/*.jpeg"
  - "**/*.JPEG"
  - "**/*.png"
  - "**/*.PNG"

altitude: 180
filename_col: "filename"
lat_col: "latitude"
lon_col: "longitude"
alt_col: "altitude"
out_csv_path: null
