# Example calibration configuration for detection inference hyperparameter optimization
# This config optimizes conf_thres, iou_thres, and matching parameters to maximize F1 score

# Path to the base DetectionEvalConfig YAML file
base_config: wildtrain\configs\detection\yolo_configs\yolo_eval.yaml

# Calibration experiment name
calibration_name: "detection_calibration_f1"

# Number of Optuna trials to run
n_trials: 50

# Objective metric to optimize
objective: f1_score  # Options: f1_score, precision, recall

# Optimization direction
direction: maximize

# Random seed for reproducibility
seed: 42

# Maximum time for optimization in seconds (optional)
timeout: null

# Hyperparameter search space
parameters:
  # Confidence threshold values to search
  conf_thres:
    - 0.1
    - 0.15
    - 0.2
    - 0.25
    - 0.3
    - 0.35
    - 0.4
    - 0.5

  # IoU threshold values for NMS/NMM filtering
  iou_thres:
    - 0.3
    - 0.4
    - 0.5
    - 0.6
    - 0.7

  # Matching IoU threshold for ground truth matching
  matching_iou_thres:
    - 0.3
    - 0.4
    - 0.5
    - 0.6

  # Merging methods to search (nms, nmm)
  merging_method:
    - nms
    - nmm

  # Overlap metrics to search (iou, ios)
  overlap_metrics:
    - iou
    - ios

# Path to load ground truth and predictions from
gt_preds_load_path: results\calibrations\detection_calibration_f1\detection_calibration_f1_gt_preds.pkl

# Whether to save ground truth and predictions
save_gt_preds: true

# Output configuration (optional)
output:
  directory: results/calibrations/detection_calibration_f1
  save_results: true
  save_plots: true
  format: json  # Options: json, csv, both
  include_optimization_history: true
